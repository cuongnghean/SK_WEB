<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">
    
    <style>
        :root { --primary-color: #0d47a1; }
        body { font-family: 'Roboto', sans-serif; background: var(--primary-color); min-height: 100vh; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body p-4">
                        <h4 class="mb-4 text-center">
                            <i class="fas fa-key text-primary me-2"></i>Đổi mật khẩu
                        </h4>
                        
                        <form id="changePasswordForm">
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu hiện tại</label>
                                <input type="password" class="form-control" id="currentPassword" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mật khẩu mới</label>
                                <input type="password" class="form-control" id="newPassword" required minlength="8">
                                <small class="text-muted">Tối thiểu 8 ký tự</small>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Xác nhận mật khẩu mới</label>
                                <input type="password" class="form-control" id="confirmPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-save me-2"></i>Đổi mật khẩu
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>
    
    <script>
        toastr.options = { positionClass: "toast-top-right", progressBar: true };
        
        $('#changePasswordForm').on('submit', function(e) {
            e.preventDefault();
            
            if ($('#newPassword').val() !== $('#confirmPassword').val()) {
                toastr.error('Mật khẩu xác nhận không khớp');
                return;
            }
            
            $.ajax({
                url: '/user/change-password',
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    current_password: $('#currentPassword').val(),
                    new_password: $('#newPassword').val(),
                    confirm_password: $('#confirmPassword').val()
                }),
                success: function(response) {
                    if (response.success) {
                        toastr.success('Đã đổi mật khẩu thành công');
                        setTimeout(() => window.location.href = '/user/profile', 1500);
                    } else {
                        toastr.error(response.error || 'Có lỗi xảy ra');
                    }
                },
                error: function(xhr) {
                    var msg = 'Có lỗi xảy ra';
                    if (xhr.responseJSON && xhr.responseJSON.error) msg = xhr.responseJSON.error;
                    toastr.error(msg);
                }
            });
        });
    </script>
</body>
</html>
