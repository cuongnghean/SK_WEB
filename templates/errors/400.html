<!DOCTYPE html>
<html lang="vi">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: linear-gradient(135deg, #0d47a1, #1565c0); min-height: 100vh; display: flex; align-items: center; justify-content: center; }

<body>

        <p class="text-muted">Xin lỗi, yêu cầu của bạn không hợp lệ. Vui lòng thử lại.</p>
        <a href="/" class="btn btn-primary"><i class="fas fa-home"></i> Về trang chủ</a>
