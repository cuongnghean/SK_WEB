{% extends "base.html" %}

{% block title %}404 - Không tìm thấy trang{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-content">
        <h1 class="headline text-warning">404</h1>
        <h3><i class="fas fa-exclamation-triangle text-warning"></i> Oops! Trang không tìm thấy.</h3>
        <p>
            Trang bạn đang tìm kiếm không tồn tại hoặc đã được di chuyển.
        </p>
        <a href="{{ url_for('public.search') }}" class="btn btn-primary">
            <i class="fas fa-home"></i> Về trang chủ
        </a>
    </div>
</div>
{% endblock %}
