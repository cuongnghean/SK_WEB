<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0d47a1, #1565c0); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4"><i class="fas fa-file-invoice-dollar text-primary"></i> He thong Tra cuu Thue</h3>
        
        <div id="message" class="alert" style="display:none;"></div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label>Username</label>
                <input type="text" id="username" class="form-control" value="admin" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" id="password" class="form-control" value="admin123" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Dang nhap</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/tra-cuu">Tra cuu khong can dang nhap</a>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').onsubmit = async function(e) {
        e.preventDefault();
        var msg = document.getElementById('message');
        msg.style.display = 'none';
        msg.className = 'alert';
        
        try {
            // Get page to extract CSRF
            var page = await fetch('/auth/login');
            var html = await page.text();
            var match = html.match(/name="csrf_token" value="([^"]+)"/);
            var csrf = match ? match[1] : '';
            
            // Submit login
            var formData = new FormData();
            formData.append('csrf_token', csrf);
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);
            
            var resp = await fetch('/auth/login', {
                method: 'POST',
                body: formData,
                redirect: 'manual'
            });
            
            if (resp.type === 'opaqueredirect' || resp.status === 302) {
                msg.textContent = 'Dang nhap thanh cong! Dang chuyen trang...';
                msg.className = 'alert alert-success';
                msg.style.display = 'block';
                setTimeout(function() { window.location.href = '/admin/dashboard'; }, 1000);
            } else {
                var text = await resp.text();
                if (text.includes('csrf') || text.includes('CSRF')) {
                    msg.textContent = 'Loi CSRF! Vui long refresh trang.';
                } else if (text.includes('invalid') || text.includes('sai')) {
                    msg.textContent = 'Username hoac password khong dung!';
                } else {
                    msg.textContent = 'Loi: ' + resp.status;
                }
                msg.className = 'alert alert-danger';
                msg.style.display = 'block';
            }
        } catch(err) {
            msg.textContent = 'Loi ket noi: ' + err.message;
            msg.className = 'alert alert-danger';
            msg.style.display = 'block';
        }
    };
    </script>
</body>
</html>
